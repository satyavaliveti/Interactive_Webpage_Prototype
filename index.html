<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Sound Slider</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <h1>Simple Sound Slider</h1>
    <p>Click start, then move the slider to change the sound.</p>

    <button id="startButton">Start Sound</button>

    <label for="pitchSlider">Pitch</label>
    <input id="pitchSlider" type="range" min="100" max="1000" value="440">

    <p>Current pitch: <span id="pitchText">440</span> Hz</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
