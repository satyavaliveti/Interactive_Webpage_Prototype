<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Sound Slider</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <h1>Interactive Webpage Prototype</h1>
    <h2> Created By Satya Valiveti :)</h2>
    <p>Click start, then use the controls to shape the sound.</p>

    <!-- start sound button -->
    <div class="button-row">
      <button id="startButton">Start Sound</button>
      <button id="stopButton" disabled>Stop Sound</button>
    </div>

    <label for="waveSelect">Waveform</label>
    <select id="waveSelect">
      <option value="sine">Sine</option>
      <option value="square">Square</option>
      <option value="triangle">Triangle</option>
      <option value="sawtooth">Sawtooth</option>
    </select>

    <div class="control">
      <label for="pitchSlider">Pitch</label>
      <input id="pitchSlider" type="range" min="100" max="1000" value="440">
      <p>Current pitch: <span id="pitchText">440</span> Hz</p>
    </div>

    <div class="control">
      <label for="volumeSlider">Volume</label>
      <input id="volumeSlider" type="range" min="0" max="100" value="20">
      <p>Current volume: <span id="volumeText">20</span>%</p>
    </div>

    <div class="control">
      <h3>Live Wave</h3>
      <canvas id="waveCanvas" width="320" height="140"></canvas>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
